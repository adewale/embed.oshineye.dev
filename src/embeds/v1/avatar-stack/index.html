<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar Stack</title>
  <style>
    /* ===== Keyboardia Design Tokens ===== */
    :root {
      --color-bg: #121212;
      --color-surface: #1e1e1e;
      --color-surface-elevated: #2a2a2a;
      --color-surface-hover: #333333;
      --color-border: #3a3a3a;
      --color-text-primary: rgba(255, 255, 255, 0.87);
      --color-text-muted: rgba(255, 255, 255, 0.6);
      --color-text-dimmed: rgba(255, 255, 255, 0.38);
      --color-accent: #e85a30;
      --color-accent-hover: #f07048;
      --color-success: #1db954;
      --color-teal: #4ecdc4;
      --color-error: #e74c3c;
      --avatar-size: 28px;
      --avatar-font-size: 14px;
      --avatar-border-width: 2px;
      --avatar-overlap: -8px;
      --avatar-overlap-spread: -4px;
      --font-system: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'SF Mono', 'Consolas', monospace;
      --transition-fast: 0.15s ease;
      --transition-enter: 0.4s ease-out;
    }

    :root.light {
      --color-bg: #f5f5f5;
      --color-surface: #ffffff;
      --color-surface-elevated: #fafafa;
      --color-surface-hover: #eeeeee;
      --color-border: #e0e0e0;
      --color-text-primary: rgba(0, 0, 0, 0.87);
      --color-text-muted: rgba(0, 0, 0, 0.6);
      --color-text-dimmed: rgba(0, 0, 0, 0.38);
    }

    @media (max-width: 480px) {
      :root {
        --avatar-size: 24px;
        --avatar-font-size: 12px;
      }
    }

    /* ===== Reduced Motion ===== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ===== Reset & Base ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-system);
      background: var(--color-bg);
      color: var(--color-text-primary);
      padding: 8px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 48px;
    }

    /* ===== Avatar Stack ===== */
    .avatar-stack-container {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-stack {
      display: flex;
      flex-direction: row-reverse;
      align-items: center;
    }

    .avatar-stack:hover .avatar {
      margin-left: var(--avatar-overlap-spread);
    }

    .avatar {
      width: var(--avatar-size);
      height: var(--avatar-size);
      border-radius: 50%;
      border: var(--avatar-border-width) solid var(--color-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--avatar-font-size);
      font-weight: 600;
      color: #ffffff;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
      margin-left: var(--avatar-overlap);
      cursor: default;
      transition: transform var(--transition-fast), margin-left var(--transition-fast);
      position: relative;
      flex-shrink: 0;
      user-select: none;
      opacity: 0;
      transform: translateY(8px);
    }

    .avatar.entered {
      opacity: 1;
      transform: translateY(0);
      transition: opacity var(--transition-enter), transform var(--transition-enter), margin-left var(--transition-fast);
    }

    .avatar:first-child {
      margin-left: 0;
    }

    .avatar:hover {
      transform: scale(1.1);
      z-index: 100;
    }

    .avatar.entered:hover {
      transform: scale(1.1);
    }

    .avatar.current-user {
      box-shadow: 0 0 0 2px var(--color-teal);
    }

    .avatar.overflow-indicator {
      background: var(--color-surface-elevated) !important;
      color: var(--color-text-dimmed);
      font-size: 11px;
      font-weight: 600;
      text-shadow: none;
      border-color: var(--color-border);
    }

    /* ===== Online count ===== */
    .user-count {
      text-align: center;
      margin-top: 6px;
      font-size: 11px;
      color: var(--color-text-dimmed);
      font-family: var(--font-mono);
    }
  </style>
</head>
<body>
  <div class="avatar-stack-container">
    <div class="avatar-stack" id="avatarStack"></div>
  </div>
  <div class="user-count" id="userCount"></div>

  <script>
    (function () {
      /* ===== Theme ===== */
      var theme = new URL(location.href).searchParams.get('theme') || 'light';
      if (theme === 'dark') {
        document.documentElement.classList.remove('light');
      } else {
        document.documentElement.classList.add('light');
      }

      /* ===== State ===== */
      var MAX_VISIBLE = 6;
      var players = [];
      var myId = null;

      /* ===== DOM Refs ===== */
      var stackEl = document.getElementById('avatarStack');
      var userCountEl = document.getElementById('userCount');

      /* ===== Render Avatar Stack ===== */
      function renderStack() {
        stackEl.innerHTML = '';

        var visiblePlayers = players.slice(0, MAX_VISIBLE);
        var overflowCount = players.length - MAX_VISIBLE;

        var elements = [];

        if (overflowCount > 0) {
          var overflowEl = document.createElement('div');
          overflowEl.className = 'avatar overflow-indicator';
          overflowEl.textContent = '+' + overflowCount;
          overflowEl.title = overflowCount + ' more';
          elements.push(overflowEl);
        }

        for (var i = visiblePlayers.length - 1; i >= 0; i--) {
          var player = visiblePlayers[i];
          var el = document.createElement('div');
          var classes = 'avatar';
          if (player.id === myId) classes += ' current-user';
          el.className = classes;
          el.style.backgroundColor = player.color;
          el.textContent = player.initial;
          el.title = player.name;
          elements.push(el);
        }

        for (var j = 0; j < elements.length; j++) {
          stackEl.appendChild(elements[j]);
        }

        /* Staggered entrance */
        var avatarEls = stackEl.querySelectorAll('.avatar');
        for (var k = 0; k < avatarEls.length; k++) {
          (function(el, delay) {
            setTimeout(function() {
              el.classList.add('entered');
            }, delay);
          })(avatarEls[k], 50 + k * 60);
        }

        userCountEl.textContent = players.length + ' online';
      }

      /* ===== Player ID (stable within session) ===== */
      function getPlayerId() {
        var key = 'embeds_player_id';
        var id = sessionStorage.getItem(key);
        if (!id) {
          id = crypto.randomUUID();
          sessionStorage.setItem(key, id);
        }
        return id;
      }

      var playerId = getPlayerId();

      /* ===== WebSocket Connection ===== */
      var ws = null;
      var reconnectDelay = 1000;
      var maxReconnectDelay = 30000;

      function connect() {
        var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        var page = encodeURIComponent(document.referrer || location.href);
        var url = protocol + '//' + location.host + '/v1/avatar-stack/ws?page=' + page + '&playerId=' + encodeURIComponent(playerId);

        ws = new WebSocket(url);

        ws.onopen = function () {
          reconnectDelay = 1000;
        };

        ws.onmessage = function (event) {
          var msg = JSON.parse(event.data);

          if (msg.type === 'snapshot') {
            players = msg.players;
            myId = msg.you;
            renderStack();
          } else if (msg.type === 'player_joined') {
            /* Avoid duplicates */
            var exists = false;
            for (var i = 0; i < players.length; i++) {
              if (players[i].id === msg.player.id) { exists = true; break; }
            }
            if (!exists) {
              players.push(msg.player);
              renderStack();
            }
          } else if (msg.type === 'player_left') {
            players = players.filter(function (p) { return p.id !== msg.playerId; });
            renderStack();
          }
        };

        ws.onclose = function () {
          scheduleReconnect();
        };

        ws.onerror = function () {
          if (ws) ws.close();
        };
      }

      function scheduleReconnect() {
        setTimeout(function () {
          reconnectDelay = Math.min(reconnectDelay * 2, maxReconnectDelay);
          connect();
        }, reconnectDelay);
      }

      /* ===== Fallback: show "You" while connecting ===== */
      var FALLBACK_PALETTE = [
        '#E53935', '#D81B60', '#8E24AA', '#5E35B1', '#3949AB', '#1E88E5',
        '#039BE5', '#00ACC1', '#00897B', '#43A047', '#7CB342', '#C0CA33',
        '#FDD835', '#FFB300', '#FB8C00', '#F4511E', '#6D4C41', '#757575'
      ];
      function hashStr(s) {
        var h = 0;
        for (var i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
        return Math.abs(h);
      }
      var fallbackColor = FALLBACK_PALETTE[hashStr(playerId) % FALLBACK_PALETTE.length];
      players = [{ id: playerId, name: 'You', color: fallbackColor, initial: 'Y' }];
      myId = playerId;
      renderStack();

      /* Start connection */
      connect();

      /* ===== ResizeObserver for postMessage-based auto-height ===== */
      new ResizeObserver(function () {
        window.parent.postMessage(
          { type: 'embeds.oshineye.resize', height: document.body.scrollHeight },
          '*'
        );
      }).observe(document.body);
    })();
  </script>
</body>
</html>
