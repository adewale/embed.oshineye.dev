<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar Stack</title>
  <style>
    /* ===== Keyboardia Design Tokens ===== */
    :root {
      --color-bg: #121212;
      --color-surface: #1e1e1e;
      --color-surface-elevated: #2a2a2a;
      --color-surface-hover: #333333;
      --color-border: #3a3a3a;
      --color-text-primary: rgba(255, 255, 255, 0.87);
      --color-text-muted: rgba(255, 255, 255, 0.6);
      --color-text-dimmed: rgba(255, 255, 255, 0.38);
      --color-accent: #e85a30;
      --color-accent-hover: #f07048;
      --color-success: #1db954;
      --color-teal: #4ecdc4;
      --color-error: #e74c3c;
      --avatar-size: 28px;
      --avatar-font-size: 14px;
      --avatar-border-width: 2px;
      --avatar-overlap: -8px;
      --avatar-overlap-spread: -4px;
      --font-system: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'SF Mono', 'Consolas', monospace;
      --transition-fast: 0.15s ease;
      --transition-enter: 0.4s ease-out;
    }

    :root.light {
      --color-bg: #f5f5f5;
      --color-surface: #ffffff;
      --color-surface-elevated: #fafafa;
      --color-surface-hover: #eeeeee;
      --color-border: #e0e0e0;
      --color-text-primary: rgba(0, 0, 0, 0.87);
      --color-text-muted: rgba(0, 0, 0, 0.6);
      --color-text-dimmed: rgba(0, 0, 0, 0.38);
    }

    @media (max-width: 480px) {
      :root {
        --avatar-size: 24px;
        --avatar-font-size: 12px;
      }
    }

    /* ===== Reduced Motion ===== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ===== Reset & Base ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-system);
      background: var(--color-bg);
      color: var(--color-text-primary);
      padding: 8px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 48px;
    }

    /* ===== Avatar Stack ===== */
    .avatar-stack-container {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-stack {
      display: flex;
      flex-direction: row-reverse;
      align-items: center;
    }

    .avatar-stack:hover .avatar {
      margin-left: var(--avatar-overlap-spread);
    }

    .avatar {
      width: var(--avatar-size);
      height: var(--avatar-size);
      border-radius: 50%;
      border: var(--avatar-border-width) solid var(--color-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--avatar-font-size);
      font-weight: 600;
      color: #ffffff;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
      margin-left: var(--avatar-overlap);
      cursor: default;
      transition: transform var(--transition-fast), margin-left var(--transition-fast);
      position: relative;
      flex-shrink: 0;
      user-select: none;
      opacity: 0;
      transform: translateY(8px);
    }

    .avatar.entered {
      opacity: 1;
      transform: translateY(0);
      transition: opacity var(--transition-enter), transform var(--transition-enter), margin-left var(--transition-fast);
    }

    .avatar:first-child {
      margin-left: 0;
    }

    .avatar:hover {
      transform: scale(1.1);
      z-index: 100;
    }

    .avatar.entered:hover {
      transform: scale(1.1);
    }

    .avatar.current-user {
      box-shadow: 0 0 0 2px var(--color-teal);
    }

    .avatar.overflow-indicator {
      background: var(--color-surface-elevated) !important;
      color: var(--color-text-dimmed);
      font-size: 11px;
      font-weight: 600;
      text-shadow: none;
      border-color: var(--color-border);
    }

    /* ===== User List (layout=list) ===== */
    .user-list-panel {
      width: 100%;
      max-width: 560px;
    }

    .user-list {
      list-style: none;
    }

    .user-list-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      transition: background var(--transition-fast);
    }

    .user-list-item:hover {
      background: var(--color-surface-hover);
    }

    .user-list-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
      flex-shrink: 0;
    }

    .user-list-info {
      flex: 1;
      min-width: 0;
    }

    .user-list-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-list-status {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
      color: var(--color-success);
    }

    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
      background: var(--color-success);
    }

    /* ===== Spread variant (scoped CSS variable override) ===== */
    .avatar-stack-container.spread {
      --avatar-overlap: -4px;
      --avatar-overlap-spread: 0px;
    }

    /* ===== Layout label ===== */
    .layout-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--color-text-dimmed);
      margin-bottom: 4px;
      text-align: center;
    }

    .layout-section {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .layout-section + .layout-section {
      margin-top: 10px;
    }

    /* ===== Online count ===== */
    .user-count {
      text-align: center;
      margin-top: 6px;
      font-size: 11px;
      color: var(--color-text-dimmed);
      font-family: var(--font-mono);
    }
  </style>
</head>
<body>
  <div id="compactSection" class="layout-section">
    <div class="avatar-stack-container">
      <div class="avatar-stack" id="avatarStack"></div>
    </div>
  </div>
  <div id="spreadSection" class="layout-section" style="display:none">
    <div class="avatar-stack-container spread">
      <div class="avatar-stack" id="avatarStackSpread"></div>
    </div>
  </div>
  <div id="listSection" class="layout-section" style="display:none">
    <div class="user-list-panel">
      <ul class="user-list" id="userList"></ul>
    </div>
  </div>
  <div class="user-count" id="userCount"></div>

  <script>
    (function () {
      /* ===== Theme ===== */
      var params = new URL(location.href).searchParams;
      var theme = params.get('theme') || 'light';
      if (theme === 'dark') {
        document.documentElement.classList.remove('light');
      } else {
        document.documentElement.classList.add('light');
      }

      /* ===== Layout ===== */
      var layout = params.get('layout') || 'compact';
      var compactSection = document.getElementById('compactSection');
      var spreadSection = document.getElementById('spreadSection');
      var listSection = document.getElementById('listSection');

      if (layout === 'spread') {
        compactSection.style.display = 'none';
        spreadSection.style.display = '';
      } else if (layout === 'list') {
        compactSection.style.display = 'none';
        listSection.style.display = '';
      } else if (layout === 'both') {
        compactSection.querySelector('.layout-label') ||
          compactSection.insertBefore(Object.assign(document.createElement('div'), { className: 'layout-label', textContent: 'Compact' }), compactSection.firstChild);
        spreadSection.style.display = '';
        spreadSection.querySelector('.layout-label') ||
          spreadSection.insertBefore(Object.assign(document.createElement('div'), { className: 'layout-label', textContent: 'Spread' }), spreadSection.firstChild);
      }

      /* ===== State ===== */
      var MAX_VISIBLE = 6;
      var MAX_VISIBLE_LIST = 10;
      var players = [];
      var myId = null;

      /* ===== DOM Refs ===== */
      var stackEls = [];
      if (layout !== 'spread' && layout !== 'list') stackEls.push(document.getElementById('avatarStack'));
      if (layout === 'spread' || layout === 'both') stackEls.push(document.getElementById('avatarStackSpread'));
      var userListEl = document.getElementById('userList');
      var userCountEl = document.getElementById('userCount');

      /* ===== Render into a single stack element ===== */
      function renderInto(targetEl) {
        targetEl.innerHTML = '';

        var visiblePlayers = players.slice(0, MAX_VISIBLE);
        var overflowCount = players.length - MAX_VISIBLE;

        var elements = [];

        if (overflowCount > 0) {
          var overflowEl = document.createElement('div');
          overflowEl.className = 'avatar overflow-indicator';
          overflowEl.textContent = '+' + overflowCount;
          overflowEl.title = overflowCount + ' more';
          elements.push(overflowEl);
        }

        for (var i = visiblePlayers.length - 1; i >= 0; i--) {
          var player = visiblePlayers[i];
          var el = document.createElement('div');
          var classes = 'avatar';
          if (player.id === myId) classes += ' current-user';
          el.className = classes;
          el.style.backgroundColor = player.color;
          el.textContent = player.initial;
          el.title = player.name;
          elements.push(el);
        }

        for (var j = 0; j < elements.length; j++) {
          targetEl.appendChild(elements[j]);
        }

        /* Staggered entrance */
        var avatarEls = targetEl.querySelectorAll('.avatar');
        for (var k = 0; k < avatarEls.length; k++) {
          (function(el, delay) {
            setTimeout(function() {
              el.classList.add('entered');
            }, delay);
          })(avatarEls[k], 50 + k * 60);
        }
      }

      /* ===== Render user list (layout=list) ===== */
      function renderUserList() {
        userListEl.innerHTML = '';
        var visible = players.slice(0, MAX_VISIBLE_LIST);
        var overflowCount = players.length - MAX_VISIBLE_LIST;

        for (var i = 0; i < visible.length; i++) {
          var player = visible[i];
          var li = document.createElement('li');
          li.className = 'user-list-item';

          var avatarDiv = document.createElement('div');
          avatarDiv.className = 'user-list-avatar';
          avatarDiv.style.backgroundColor = player.color;
          avatarDiv.textContent = player.initial;

          var infoDiv = document.createElement('div');
          infoDiv.className = 'user-list-info';

          var nameDiv = document.createElement('div');
          nameDiv.className = 'user-list-name';
          nameDiv.textContent = player.name + (player.id === myId ? ' (You)' : '');

          var statusDiv = document.createElement('div');
          statusDiv.className = 'user-list-status';
          var dot = document.createElement('span');
          dot.className = 'status-dot';
          statusDiv.appendChild(dot);
          statusDiv.appendChild(document.createTextNode('Online'));

          infoDiv.appendChild(nameDiv);
          infoDiv.appendChild(statusDiv);
          li.appendChild(avatarDiv);
          li.appendChild(infoDiv);
          userListEl.appendChild(li);
        }

        if (overflowCount > 0) {
          var moreLi = document.createElement('li');
          moreLi.className = 'user-list-item more-users';

          var moreAvatar = document.createElement('div');
          moreAvatar.className = 'user-list-avatar';
          moreAvatar.style.backgroundColor = 'var(--color-surface-elevated)';
          moreAvatar.style.color = 'var(--color-text-dimmed)';
          moreAvatar.style.border = '1px solid var(--color-border)';
          moreAvatar.textContent = '+' + overflowCount;
          moreAvatar.style.fontSize = '11px';

          var moreInfo = document.createElement('div');
          moreInfo.className = 'user-list-info';
          var moreName = document.createElement('div');
          moreName.className = 'user-list-name';
          moreName.style.color = 'var(--color-text-dimmed)';
          moreName.textContent = overflowCount + ' more ' + (overflowCount === 1 ? 'user' : 'users');

          moreInfo.appendChild(moreName);
          moreLi.appendChild(moreAvatar);
          moreLi.appendChild(moreInfo);
          userListEl.appendChild(moreLi);
        }
      }

      /* ===== Render all visible stacks ===== */
      function renderStack() {
        for (var s = 0; s < stackEls.length; s++) {
          renderInto(stackEls[s]);
        }
        if (layout === 'list') renderUserList();
        userCountEl.textContent = players.length + ' online';
      }

      /* ===== Player ID (stable within session) ===== */
      function getPlayerId() {
        var key = 'embeds_player_id';
        var id = sessionStorage.getItem(key);
        if (!id) {
          id = crypto.randomUUID();
          sessionStorage.setItem(key, id);
        }
        return id;
      }

      var playerId = getPlayerId();

      /* ===== WebSocket Connection ===== */
      var ws = null;
      var reconnectDelay = 1000;
      var maxReconnectDelay = 30000;

      function connect() {
        var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        var page = encodeURIComponent(location.href);
        var url = protocol + '//' + location.host + '/v1/avatar-stack/ws?page=' + page + '&playerId=' + encodeURIComponent(playerId);

        ws = new WebSocket(url);

        ws.onopen = function () {
          reconnectDelay = 1000;
        };

        ws.onmessage = function (event) {
          var msg = JSON.parse(event.data);

          if (msg.type === 'snapshot') {
            players = msg.players;
            myId = msg.you;
            renderStack();
          } else if (msg.type === 'player_joined') {
            /* Avoid duplicates */
            var exists = false;
            for (var i = 0; i < players.length; i++) {
              if (players[i].id === msg.player.id) { exists = true; break; }
            }
            if (!exists) {
              players.push(msg.player);
              renderStack();
            }
          } else if (msg.type === 'player_left') {
            players = players.filter(function (p) { return p.id !== msg.playerId; });
            renderStack();
          }
        };

        ws.onclose = function () {
          scheduleReconnect();
        };

        ws.onerror = function () {
          if (ws) ws.close();
        };
      }

      function scheduleReconnect() {
        setTimeout(function () {
          reconnectDelay = Math.min(reconnectDelay * 2, maxReconnectDelay);
          connect();
        }, reconnectDelay);
      }

      /* ===== Fallback: show "You" while connecting ===== */
      var FALLBACK_PALETTE = [
        '#E53935', '#D81B60', '#8E24AA', '#5E35B1', '#3949AB', '#1E88E5',
        '#039BE5', '#00ACC1', '#00897B', '#43A047', '#7CB342', '#C0CA33',
        '#FDD835', '#FFB300', '#FB8C00', '#F4511E', '#6D4C41', '#757575'
      ];
      var FALLBACK_COLOR_NAMES = [
        'Red', 'Pink', 'Purple', 'Violet', 'Indigo', 'Blue',
        'Sky', 'Cyan', 'Teal', 'Green', 'Lime', 'Olive',
        'Yellow', 'Amber', 'Orange', 'Coral', 'Brown', 'Grey'
      ];
      var FALLBACK_ANIMALS = [
        'Ant', 'Badger', 'Bat', 'Bear', 'Beaver', 'Bee', 'Bird', 'Bison',
        'Butterfly', 'Camel', 'Cat', 'Cheetah', 'Chicken', 'Crab', 'Crow',
        'Deer', 'Dog', 'Dolphin', 'Dove', 'Dragon', 'Duck', 'Eagle', 'Elephant',
        'Falcon', 'Fish', 'Flamingo', 'Fox', 'Frog', 'Giraffe', 'Goat',
        'Gorilla', 'Hamster', 'Hawk', 'Hedgehog', 'Hippo', 'Horse', 'Jaguar',
        'Kangaroo', 'Koala', 'Lemur', 'Leopard', 'Lion', 'Llama', 'Lobster',
        'Monkey', 'Moose', 'Mouse', 'Octopus', 'Otter', 'Owl', 'Panda',
        'Panther', 'Parrot', 'Peacock', 'Penguin', 'Pig', 'Puma', 'Rabbit',
        'Raccoon', 'Raven', 'Rhino', 'Seal', 'Shark', 'Sheep', 'Snake',
        'Spider', 'Squid', 'Swan', 'Tiger', 'Turtle', 'Whale', 'Wolf', 'Zebra'
      ];
      function hashStr(s) {
        var h = 0;
        for (var i = 0; i < s.length; i++) h = ((h << 5) - h) + s.charCodeAt(i) | 0;
        return Math.abs(h);
      }
      var fbHash = hashStr(playerId);
      var fbColorIdx = fbHash % FALLBACK_PALETTE.length;
      var fbAnimalIdx = (fbHash >> 8) % FALLBACK_ANIMALS.length;
      var fbColor = FALLBACK_PALETTE[fbColorIdx];
      var fbAnimal = FALLBACK_ANIMALS[fbAnimalIdx];
      var fbName = FALLBACK_COLOR_NAMES[fbColorIdx] + ' ' + fbAnimal;
      players = [{ id: playerId, name: fbName, color: fbColor, initial: fbAnimal.charAt(0) }];
      myId = playerId;
      renderStack();

      /* Start connection */
      connect();

      /* ===== ResizeObserver for postMessage-based auto-height ===== */
      new ResizeObserver(function () {
        window.parent.postMessage(
          { type: 'embed.oshineye.resize', height: document.body.scrollHeight },
          '*'
        );
      }).observe(document.body);
    })();
  </script>
</body>
</html>
