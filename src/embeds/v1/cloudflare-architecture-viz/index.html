<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloudflare Architecture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Warm cream/brown palette — light mode */
      --bg: #fffcf6;
      --surface: #ffffff;
      --surface-hover: #f5efe5;
      --border: #dccdbf;
      --border-light: #ebe1d5;
      --text: #2c1a14;
      --text-muted: #6b5347;
      --accent: #e85e2e;
      --accent-dark: #c94d22;
      --accent-glow: #e85e2e22;
      --accent-light: #e85e2e33;
      --blue: #2c7cb0;
      --blue-light: #2c7cb022;
      --green: #398557;
      --green-light: #39855722;
      --cyan: #2b818e;
      --cyan-light: #2b818e22;
      --indigo: #6373b6;
      --indigo-light: #6373b622;
      --violet: #9f5bb0;
      --violet-light: #9f5bb022;
      --red: #da304c;
      --red-light: #da304c22;
      --gold: #a26a09;
      --gold-light: #a26a0922;
      --gray-0: #2c1a14;
      --gray-4: #6b5347;
      --gray-6: #a09080;
      --gray-8: #f5efe5;
      --node-shadow: #2c1a140a;
      --flow-color: #a09080;
      --flow-active: #e85e2e;
      --selector-bg: #f5efe5;
      --shadow-card: 0 1px 3px #2c1a140f, 0 4px 16px #2c1a140a;
      --shadow-card-hover: 0 2px 8px #2c1a141a, 0 8px 32px #2c1a140f;
      --font-display: 'DM Serif Display', Georgia, 'Times New Roman', serif;
      --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    :root.dark {
      /* Warm dark mode */
      --bg: #1a120e;
      --surface: #2a1e18;
      --surface-hover: #3a2c24;
      --border: #4a3828;
      --border-light: #3a2c24;
      --text: #f5efe5;
      --text-muted: #a08978;
      --accent: #e85e2e;
      --accent-dark: #c94d22;
      --accent-glow: #e85e2e33;
      --accent-light: #e85e2e44;
      --blue: #7cb7de;
      --blue-light: #7cb7de22;
      --green: #79c698;
      --green-light: #79c69822;
      --cyan: #66c3d1;
      --cyan-light: #66c3d122;
      --indigo: #a5aed5;
      --indigo-light: #a5aed522;
      --violet: #c9a2d2;
      --violet-light: #c9a2d222;
      --red: #e35f75;
      --red-light: #e35f7522;
      --gold: #f4a929;
      --gold-light: #f4a92922;
      --gray-0: #f5efe5;
      --gray-4: #a08978;
      --gray-6: #4a3828;
      --gray-8: #2a1e18;
      --node-shadow: #0000004d;
      --flow-color: #a08978;
      --flow-active: #e85e2e;
      --selector-bg: #2a1e18;
      --shadow-card: 0 1px 3px #0000001a, 0 4px 16px #00000014;
      --shadow-card-hover: 0 2px 8px #00000033, 0 8px 32px #0000001f;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    h1 {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 400;
      color: var(--accent);
    }

    .project-selector {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .project-btn {
      padding: 5px 14px;
      border: 1px solid var(--border);
      border-radius: 100px;
      background: var(--selector-bg);
      color: var(--text-muted);
      font-size: 0.78rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .project-btn:hover {
      background: var(--surface-hover);
      color: var(--text);
    }

    .project-btn.active {
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
    }

    .project-info {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 20px;
      line-height: 1.55;
    }

    .project-info a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .project-info a:hover {
      color: var(--accent-dark);
      text-decoration: underline;
    }

    .arch-canvas {
      position: relative;
      width: 100%;
      min-height: 320px;
    }

    .arch-canvas svg.arch-arrows {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .arch-canvas svg.arch-labels {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    .arch-canvas svg path.arch-flow {
      pointer-events: stroke;
    }

    .arch-nodes {
      position: relative;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      padding: 16px 0;
    }

    .arch-node {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 14px 18px;
      border-radius: 10px;
      background: var(--surface);
      border: 1.5px solid var(--border-light);
      cursor: default;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      min-width: 100px;
      text-align: center;
      box-shadow: var(--shadow-card);
    }

    .arch-node:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-card-hover);
      border-color: var(--border);
    }

    .arch-node .node-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
    }

    .arch-node .node-icon svg {
      width: 20px;
      height: 20px;
      stroke: #ffffff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .arch-node .node-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }

    .arch-node .node-detail {
      font-size: 0.68rem;
      color: var(--text-muted);
      max-width: 120px;
      text-align: center;
    }

    /* Primitive-specific colors */
    .arch-node[data-primitive="workers"] .node-icon { background: var(--accent); }
    .arch-node[data-primitive="workers"] { border-color: var(--accent-light); }
    .arch-node[data-primitive="static-assets"] .node-icon { background: var(--gray-4); }
    .arch-node[data-primitive="durable-objects"] .node-icon { background: var(--blue); }
    .arch-node[data-primitive="durable-objects"] { border-color: var(--blue-light); }
    .arch-node[data-primitive="kv"] .node-icon { background: var(--green); }
    .arch-node[data-primitive="kv"] { border-color: var(--green-light); }
    .arch-node[data-primitive="d1"] .node-icon { background: var(--indigo); }
    .arch-node[data-primitive="d1"] { border-color: var(--indigo-light); }
    .arch-node[data-primitive="r2"] .node-icon { background: var(--cyan); }
    .arch-node[data-primitive="r2"] { border-color: var(--cyan-light); }
    .arch-node[data-primitive="queues"] .node-icon { background: var(--violet); }
    .arch-node[data-primitive="queues"] { border-color: var(--violet-light); }
    .arch-node[data-primitive="ai"] .node-icon { background: var(--red); }
    .arch-node[data-primitive="ai"] { border-color: var(--red-light); }
    .arch-node[data-primitive="vectorize"] .node-icon { background: var(--indigo); }
    .arch-node[data-primitive="vectorize"] { border-color: var(--indigo-light); }
    .arch-node[data-primitive="cron"] .node-icon { background: var(--gold); }
    .arch-node[data-primitive="cron"] { border-color: var(--gold-light); }
    .arch-node[data-primitive="client"] .node-icon { background: var(--gray-4); }
    .arch-node[data-primitive="client"] { border-color: var(--gray-6); }
    .arch-node[data-primitive="external"] .node-icon { background: var(--text-muted); }

    /* SVG flow arrows — CF reference architecture style */
    .arch-flow {
      fill: none;
      stroke: var(--flow-color);
      stroke-width: 2.5;
      stroke-linecap: round;
      opacity: 0.4;
      transition: all 0.25s;
    }

    .arch-flow:hover,
    .arch-flow.active {
      stroke: var(--flow-active);
      stroke-width: 3;
      opacity: 1;
    }

    .arch-flow-label {
      font-size: 10px;
      fill: var(--text-muted);
      stroke: var(--bg);
      stroke-width: 4px;
      paint-order: stroke fill;
      text-anchor: middle;
      font-family: var(--font-body);
      font-weight: 500;
      opacity: 0.7;
      transition: all 0.2s;
    }

    .arch-flow-label.active {
      fill: var(--text);
      opacity: 1;
      font-weight: 600;
    }

    /* Architecture tiers */
    .arch-tier {
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .tier-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      margin-bottom: 8px;
      padding-left: 4px;
    }

    .tier-nodes {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
    }

    /* Connector lines between tiers — generous gap for arrow routing */
    .tier-connector {
      display: flex;
      justify-content: center;
      padding: 14px 0;
      position: relative;
      z-index: 1;
    }

    .tier-connector .line {
      width: 2px;
      height: 32px;
      background: var(--border);
    }

    /* Legend */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--border-light);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.68rem;
      color: var(--text-muted);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
    }

    @media (max-width: 500px) {
      body { padding: 12px; }
      .arch-node { min-width: 80px; padding: 10px 12px; }
      .arch-node .node-icon { width: 28px; height: 28px; font-size: 14px; }
      .arch-node .node-label { font-size: 0.7rem; }
      .arch-node .node-detail { font-size: 0.62rem; }
    }
  </style>
</head>

      "cron": '<path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="10"/>',
      "client": '<circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/>',
      "external": '<circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/>'
    };

    // Theme
    var params = new URL(location.href).searchParams;
    var theme = params.get('theme') || 'light';
    if (theme === 'dark') document.documentElement.classList.add('dark');

    var activeProject = params.get('project') || PROJECTS[0].id;
    var renderGen = 0;

    function renderProjectSelector() {
      var sel = document.getElementById('projectSelector');
      sel.innerHTML = '';
      PROJECTS.forEach(function(p) {
        var btn = document.createElement('button');
        btn.className = 'project-btn' + (p.id === activeProject ? ' active' : '');

    }

    function switchProject(id) {

    }

    function renderProject() {
      renderGen++;
      var project = PROJECTS.find(function(p) { return p.id === activeProject; });
      if (!project) return;

      info.innerHTML = '<a href="' + project.url + '" target="_blank" rel="noopener">' + project.name + '</a> &mdash; ' + project.description;

      var canvas = document.getElementById('archCanvas');
      canvas.innerHTML = '';

      project.tiers.forEach(function(tier, ti) {
        var tierEl = document.createElement('div');
        tierEl.className = 'arch-tier';

        var label = document.createElement('div');
        label.className = 'tier-label';
        label.textContent = tier.label;
        tierEl.appendChild(label);

        nodesEl.className = 'tier-nodes';

          nodeEl.setAttribute('data-primitive', node.primitive);

          icon.className = 'node-icon';
          if (PRIMITIVE_ICONS[node.primitive]) {
            var tmp = document.createElement('div');
            tmp.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + PRIMITIVE_ICONS[node.primitive] + '</svg>';
            icon.appendChild(tmp.firstChild);
          } else {
            icon.textContent = node.icon;
          }
          nodeEl.appendChild(icon);

          var lbl = document.createElement('div');
          lbl.className = 'node-label';
          lbl.textContent = node.label;
          nodeEl.appendChild(lbl);

          if (node.detail) {

        });

        tierEl.appendChild(nodesEl);
        canvas.appendChild(tierEl);

        if (ti < project.tiers.length - 1) {

          conn.className = 'tier-connector';

          canvas.appendChild(conn);
        }
      });

      renderFlowArrows(project, renderGen);
      renderLegend(project);
    }

    // ===== Orthogonal arrow routing (CF reference architecture style) =====

    function getEdgePoint(node, side, index, total) {
      var spacing = 18;
      var offset = (index - (total - 1) / 2) * spacing;
      switch (side) {
        case 'bottom': return { x: node.x + offset, y: node.bottom };
        case 'top':    return { x: node.x + offset, y: node.top };
        case 'right':  return { x: node.right, y: node.y + offset };
        case 'left':   return { x: node.left, y: node.y + offset };
      }
    }

    // Build an SVG path through orthogonal waypoints with rounded corners
    function buildWaypointPath(points) {
      if (points.length < 2) return '';
      var R = 14;
      var d = 'M' + points[0].x + ' ' + points[0].y;

      for (var i = 1; i < points.length - 1; i++) {
        var prev = points[i - 1];
        var curr = points[i];
        var next = points[i + 1];

        // Segment lengths to limit radius
        var len1 = Math.abs(curr.x - prev.x) + Math.abs(curr.y - prev.y);
        var len2 = Math.abs(next.x - curr.x) + Math.abs(next.y - curr.y);
        var eR = Math.min(R, len1 / 2, len2 / 2);
        if (eR < 1) { d += ' L' + curr.x + ' ' + curr.y; continue; }

        // Approach direction (prev→curr)
        var dx1 = curr.x - prev.x;
        var dy1 = curr.y - prev.y;
        // Departure direction (curr→next)
        var dx2 = next.x - curr.x;
        var dy2 = next.y - curr.y;

        // Point before corner (approach)
        var ax = dx1 !== 0 ? curr.x - Math.sign(dx1) * eR : curr.x;
        var ay = dy1 !== 0 ? curr.y - Math.sign(dy1) * eR : curr.y;

        // Point after corner (departure)
        var bx = dx2 !== 0 ? curr.x + Math.sign(dx2) * eR : curr.x;
        var by = dy2 !== 0 ? curr.y + Math.sign(dy2) * eR : curr.y;

        // Line to approach, quadratic Bezier through corner
        d += ' L' + ax + ' ' + ay;
        d += ' Q' + curr.x + ' ' + curr.y + ' ' + bx + ' ' + by;
      }

      // Line to last point
      var last = points[points.length - 1];
      d += ' L' + last.x + ' ' + last.y;
      return d;
    }

    function renderFlowArrows(project, gen) {
      var canvas = document.getElementById('archCanvas');
      var svgNS = 'http://www.w3.org/2000/svg';

      requestAnimationFrame(function() {
        if (gen !== renderGen) return;

        var rect = canvas.getBoundingClientRect();
        var viewBox = '0 0 ' + rect.width + ' ' + rect.height;

        // Two SVG layers: arrows behind nodes, labels above nodes
        var svg = document.createElementNS(svgNS, 'svg');
        svg.setAttribute('class', 'arch-arrows');
        svg.setAttribute('viewBox', viewBox);
        svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible';

        var svgLabels = document.createElementNS(svgNS, 'svg');
        svgLabels.setAttribute('class', 'arch-labels');
        svgLabels.setAttribute('viewBox', viewBox);
        svgLabels.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible';

        // Arrowhead markers
        var defs = document.createElementNS(svgNS, 'defs');
        function makeMarker(id, fill) {
          var m = document.createElementNS(svgNS, 'marker');
          m.setAttribute('id', id);
          m.setAttribute('markerWidth', '6');
          m.setAttribute('markerHeight', '5');
          m.setAttribute('refX', '5.5');
          m.setAttribute('refY', '2.5');
          m.setAttribute('orient', 'auto');
          var poly = document.createElementNS(svgNS, 'polygon');
          poly.setAttribute('points', '0 0.5, 5 2.5, 0 4.5');
          poly.setAttribute('fill', fill);
          m.appendChild(poly);
          return m;
        }
        defs.appendChild(makeMarker('arrow', 'var(--flow-color)'));
        defs.appendChild(makeMarker('arrow-active', 'var(--flow-active)'));
        svg.appendChild(defs);

        // Append svgLabels early so getBBox() works for text measurement
        canvas.appendChild(svgLabels);

        // Text measurement with caching via getBBox()
        var textMeasureCache = {};
        function measureText(text) {
          if (textMeasureCache[text]) return textMeasureCache[text];
          var t = document.createElementNS(svgNS, 'text');
          t.setAttribute('class', 'arch-flow-label');
          t.setAttribute('x', '0');
          t.setAttribute('y', '0');
          t.textContent = text;
          svgLabels.appendChild(t);
          var bbox = t.getBBox();
          svgLabels.removeChild(t);
          textMeasureCache[text] = { width: bbox.width + 4, height: bbox.height };
          return textMeasureCache[text];
        }

        // Build node position map
        var nodeEls = canvas.querySelectorAll('.arch-node');
        var nodeMap = {};
        nodeEls.forEach(function(n) {
          var lbl = n.getAttribute('data-label');
          var r = n.getBoundingClientRect();
          nodeMap[lbl] = {
            x: r.left - rect.left + r.width / 2,
            y: r.top - rect.top + r.height / 2,
            w: r.width,
            h: r.height,
            top: r.top - rect.top,
            bottom: r.top - rect.top + r.height,
            left: r.left - rect.left,
            right: r.left - rect.left + r.width
          };
        });

        // Calculate tier gap channels for routing horizontal segments
        // Each channel is the vertical midpoint between one tier's bottom and the next tier's top
        var tierEls = canvas.querySelectorAll('.arch-tier');
        var tierBounds = [];
        tierEls.forEach(function(t) {
          var r = t.getBoundingClientRect();
          tierBounds.push({
            top: r.top - rect.top,
            bottom: r.top - rect.top + r.height
          });
        });
        // channels[i] = midpoint of gap between tier i and tier i+1
        var channels = [];
        for (var ci = 0; ci < tierBounds.length - 1; ci++) {
          channels.push((tierBounds[ci].bottom + tierBounds[ci + 1].top) / 2);
        }

        // Map each node label to its tier index
        var nodeTierIndex = {};
        project.tiers.forEach(function(tier, ti) {
          tier.nodes.forEach(function(node) {
            nodeTierIndex[node.label] = ti;
          });
        });

        // Compute bounding box of nodes in each tier (for routing around them)
        var tierNodeBounds = [];
        project.tiers.forEach(function(tier) {
          var left = Infinity, right = -Infinity;
          tier.nodes.forEach(function(node) {
            var nm = nodeMap[node.label];
            if (nm) {
              left = Math.min(left, nm.left);
              right = Math.max(right, nm.right);
            }
          });
          tierNodeBounds.push({ left: left, right: right });
        });

        // Determine exit/enter sides and collect connections per node edge
        var connections = {};
        var flowData = [];

        project.flows.forEach(function(flow, fi) {
          var from = nodeMap[flow.from];
          var to = nodeMap[flow.to];
          if (!from || !to) return;

          var fromTier = nodeTierIndex[flow.from];
          var toTier = nodeTierIndex[flow.to];
          var sameTier = fromTier === toTier;
          var exitSide, enterSide;

          if (sameTier) {
            // Check for intermediate nodes that would obstruct a horizontal path
            var minFlowX = Math.min(from.x, to.x);
            var maxFlowX = Math.max(from.x, to.x);
            var sameTierObstacle = false;
            project.tiers[fromTier].nodes.forEach(function(n) {
              if (n.label !== flow.from && n.label !== flow.to) {
                var nm = nodeMap[n.label];
                if (nm && nm.x > minFlowX && nm.x < maxFlowX) sameTierObstacle = true;
              }
            });
            if (sameTierObstacle) {
              // Route above the tier via top edges
              exitSide = 'top';
              enterSide = 'top';
            } else {
              exitSide = to.x > from.x ? 'right' : 'left';
              enterSide = to.x > from.x ? 'left' : 'right';
            }
          } else if (to.y > from.y) {
            exitSide = 'bottom';
            enterSide = 'top';
          } else {
            exitSide = 'top';
            enterSide = 'bottom';
          }

          if (!connections[flow.from]) connections[flow.from] = { bottom: [], top: [], left: [], right: [] };
          if (!connections[flow.to]) connections[flow.to] = { bottom: [], top: [], left: [], right: [] };

          connections[flow.from][exitSide].push({ fi: fi, type: 'exit', otherX: to.x, otherY: to.y });
          connections[flow.to][enterSide].push({ fi: fi, type: 'enter', otherX: from.x, otherY: from.y });

          flowData[fi] = { exitSide: exitSide, enterSide: enterSide, label: flow.label, fromLabel: flow.from, toLabel: flow.to };
        });

        // Sort connections on each edge to minimize crossings
        Object.keys(connections).forEach(function(nodeLabel) {
          ['bottom', 'top', 'left', 'right'].forEach(function(side) {
            connections[nodeLabel][side].sort(function(a, b) {
              if (side === 'left' || side === 'right') return a.otherY - b.otherY;
              return a.otherX - b.otherX;
            });
          });
        });

        // Assign edge positions to each flow endpoint
        var flowPoints = {};
        Object.keys(connections).forEach(function(nodeLabel) {
          var node = nodeMap[nodeLabel];
          if (!node) return;
          ['bottom', 'top', 'left', 'right'].forEach(function(side) {
            var conns = connections[nodeLabel][side];
            var total = conns.length;
            conns.forEach(function(conn, i) {
              var pt = getEdgePoint(node, side, i, total);
              if (!flowPoints[conn.fi]) flowPoints[conn.fi] = {};
              if (conn.type === 'exit') {
                flowPoints[conn.fi].exitPt = pt;
              } else {
                flowPoints[conn.fi].enterPt = pt;
              }
            });
          });
        });

        // Channel-based offset assignment: group adjacent-tier flows by channel
        var channelOffsets = {};
        var channelGroups = {};
        flowData.forEach(function(fd, fi) {
          if (!fd) return;
          var fromTier = nodeTierIndex[fd.fromLabel];
          var toTier = nodeTierIndex[fd.toLabel];
          if (fromTier === toTier) return;
          var startTier = Math.min(fromTier, toTier);
          var endTier = Math.max(fromTier, toTier);
          if (endTier - startTier !== 1) return;
          var chIdx = startTier;
          if (!channelGroups[chIdx]) channelGroups[chIdx] = [];
          var pts = flowPoints[fi];
          var span = pts ? Math.abs((pts.exitPt ? pts.exitPt.x : 0) - (pts.enterPt ? pts.enterPt.x : 0)) : 0;
          channelGroups[chIdx].push({ fi: fi, span: span });
        });
        Object.keys(channelGroups).forEach(function(chIdx) {
          var group = channelGroups[chIdx];
          group.sort(function(a, b) { return a.span - b.span; });
          var n = group.length;
          var spacing = 5;
          group.forEach(function(g, i) {
            channelOffsets[g.fi] = (i - (n - 1) / 2) * spacing;
          });
        });

        // Build waypoints for each flow
        function computeWaypoints(fd, fi) {
          var pts = flowPoints[fi];
          if (!pts || !pts.exitPt || !pts.enterPt) return null;
          var p1 = pts.exitPt;
          var p2 = pts.enterPt;
          var fromTier = nodeTierIndex[fd.fromLabel];
          var toTier = nodeTierIndex[fd.toLabel];

          // Same tier
          if (fromTier === toTier) {
            // If exit is 'top', this is an obstructed same-tier flow — route above
            if (fd.exitSide === 'top' && fd.enterSide === 'top') {
              var aboveY = tierBounds[fromTier].top - 16;
              return [p1, { x: p1.x, y: aboveY }, { x: p2.x, y: aboveY }, p2];
            }
            return [p1, p2];
          }

          // Same X — straight vertical
          if (Math.abs(p1.x - p2.x) < 2) {
            return [p1, p2];
          }

          var goingDown = toTier > fromTier;
          var startTier = Math.min(fromTier, toTier);
          var endTier = Math.max(fromTier, toTier);
          var tierGap = endTier - startTier;

          // Adjacent tiers — single channel route with per-flow offset
          if (tierGap === 1) {
            var ch = channels[startTier];
            if (ch == null) return [p1, p2];
            // Offset each flow slightly so parallel routes don't overlap
            var chOffset = channelOffsets[fi] || 0;
            var adjCh = ch + chOffset;
            return [
              p1,
              { x: p1.x, y: adjCh },
              { x: p2.x, y: adjCh },
              p2
            ];
          }

          // Multi-tier flow — route via canvas-edge corridor to avoid intermediate nodes
          var corridorMargin = 30;
          var minLeft = Infinity, maxRight = -Infinity;
          for (var t = startTier; t <= endTier; t++) {
            if (tierNodeBounds[t]) {
              minLeft = Math.min(minLeft, tierNodeBounds[t].left);
              maxRight = Math.max(maxRight, tierNodeBounds[t].right);
            }
          }
          var leftCorr = Math.max(10, minLeft - corridorMargin);
          var rightCorr = Math.min(rect.width - 10, maxRight + corridorMargin);

          // Pick corridor side closer to the midpoint of source+target
          var midX = (p1.x + p2.x) / 2;
          var corridorX = (Math.abs(midX - leftCorr) < Math.abs(midX - rightCorr)) ? leftCorr : rightCorr;

          var waypoints = [p1];
          // Channel adjacent to source tier (in direction of travel)
          var firstCh = goingDown ? channels[fromTier] : channels[fromTier - 1];
          // Channel adjacent to target tier (in direction of travel)
          var lastCh = goingDown ? channels[toTier - 1] : channels[toTier];

          if (firstCh != null) {
            waypoints.push({ x: p1.x, y: firstCh });
            waypoints.push({ x: corridorX, y: firstCh });
          }
          if (lastCh != null && lastCh !== firstCh) {
            waypoints.push({ x: corridorX, y: lastCh });
            waypoints.push({ x: p2.x, y: lastCh });
          } else if (firstCh != null) {
            waypoints.push({ x: p2.x, y: firstCh });
          }
          waypoints.push(p2);
          return waypoints;
        }

        // --- Pass 1: compute paths and candidate label positions ---
        var flowRenders = [];

        // Build nodeBoxes array for overlap checking
        var nodeBoxes = [];
        Object.keys(nodeMap).forEach(function(nlbl) {
          var nm = nodeMap[nlbl];
          nodeBoxes.push({ left: nm.left, right: nm.right, top: nm.top, bottom: nm.bottom });
        });

        flowData.forEach(function(fd, fi) {
          if (!fd) return;
          var waypoints = computeWaypoints(fd, fi);
          if (!waypoints || waypoints.length < 2) return;

          var d = buildWaypointPath(waypoints);
          var fromTier = nodeTierIndex[fd.fromLabel];
          var toTier = nodeTierIndex[fd.toLabel];
          var measured = measureText(fd.label);

          // Generate candidate positions from segments
          var candidates = [];
          for (var wi = 0; wi < waypoints.length - 1; wi++) {
            var wdx = Math.abs(waypoints[wi + 1].x - waypoints[wi].x);
            var wdy = Math.abs(waypoints[wi + 1].y - waypoints[wi].y);
            var segLen = wdx + wdy;
            var isHorizontal = wdx > wdy;

            if (isHorizontal && segLen > 20) {
              var fracs = [0.5, 0.25, 0.75];
              for (var fc = 0; fc < fracs.length; fc++) {
                var frac = fracs[fc];
                var mx = waypoints[wi].x + (waypoints[wi + 1].x - waypoints[wi].x) * frac;
                var my = (waypoints[wi].y + waypoints[wi + 1].y) / 2;
                candidates.push({ x: mx, y: my - 8, score: segLen * (frac === 0.5 ? 1.0 : 0.7) });
                candidates.push({ x: mx, y: my + 14, score: segLen * (frac === 0.5 ? 0.6 : 0.4) });
              }
            } else if (!isHorizontal && segLen > 30) {
              var mx2 = (waypoints[wi].x + waypoints[wi + 1].x) / 2;
              var my2 = (waypoints[wi].y + waypoints[wi + 1].y) / 2;
              candidates.push({ x: mx2 + measured.width / 2 + 6, y: my2, score: segLen * 0.5 });
              candidates.push({ x: mx2 - measured.width / 2 - 6, y: my2, score: segLen * 0.4 });
            }
          }

          // For same-tier flows, force label above the tier
          if (fromTier === toTier) {
            var aboveY = tierBounds[fromTier].top - 6;
            var midX = (waypoints[0].x + waypoints[waypoints.length - 1].x) / 2;
            candidates = [{ x: midX, y: aboveY, score: 100 }];
          }

          // Sort candidates by score (best first)
          candidates.sort(function(a, b) { return b.score - a.score; });

          // Pick first candidate that doesn't overlap any node box
          var chosen = candidates[0] || { x: 0, y: 0 };
          var hw = measured.width / 2;
          var hh = measured.height / 2;
          for (var ci2 = 0; ci2 < candidates.length; ci2++) {
            var c = candidates[ci2];
            var cRect = { left: c.x - hw, right: c.x + hw, top: c.y - hh, bottom: c.y + hh };
            var overlaps = false;
            for (var ni = 0; ni < nodeBoxes.length; ni++) {
              if (cRect.left < nodeBoxes[ni].right && cRect.right > nodeBoxes[ni].left &&
                  cRect.top < nodeBoxes[ni].bottom && cRect.bottom > nodeBoxes[ni].top) {
                overlaps = true;
                break;
              }
            }
            if (!overlaps) { chosen = c; break; }
          }

          flowRenders.push({
            fi: fi,
            fd: fd,
            d: d,
            labelX: chosen.x,
            labelY: chosen.y,
            text: fd.label,
            measured: measured
          });
        });

        // --- Pass 2: bidirectional label deconfliction ---
        function labelRect(lr) {
          var m = lr.measured || measureText(lr.text);
          return {
            left: lr.labelX - m.width / 2,
            right: lr.labelX + m.width / 2,
            top: lr.labelY - m.height / 2,
            bottom: lr.labelY + m.height / 2
          };
        }

        function rectsOverlap(a, b) {
          return a.left < b.right && a.right > b.left && a.top < b.bottom && a.bottom > b.top;
        }

        // First pass: check each label against all nodes, shift above if overlapping
        flowRenders.forEach(function(lr) {
          var lr_rect = labelRect(lr);
          for (var ni = 0; ni < nodeBoxes.length; ni++) {
            if (rectsOverlap(lr_rect, nodeBoxes[ni])) {
              lr.labelY = Math.min(lr.labelY, nodeBoxes[ni].top - (lr.measured || measureText(lr.text)).height / 2 - 4);
              lr_rect = labelRect(lr);
            }
          }
        });

        // Sort by Y for iterative nudge
        flowRenders.sort(function(a, b) { return a.labelY - b.labelY; });

        // Iterative bidirectional nudge
        for (var pass = 0; pass < 8; pass++) {
          var moved = false;
          for (var li = 0; li < flowRenders.length; li++) {
            for (var lj = li + 1; lj < flowRenders.length; lj++) {
              var ra = labelRect(flowRenders[li]);
              var rb = labelRect(flowRenders[lj]);
              if (!rectsOverlap(ra, rb)) continue;

              var overlapX = Math.min(ra.right, rb.right) - Math.max(ra.left, rb.left);
              var overlapY = Math.min(ra.bottom, rb.bottom) - Math.max(ra.top, rb.top);

              if (overlapX < 40 && overlapX < overlapY) {
                // X nudge
                var nudge = (overlapX + 4) / 2;
                if (flowRenders[li].labelX < flowRenders[lj].labelX) {
                  flowRenders[li].labelX -= nudge;
                  flowRenders[lj].labelX += nudge;
                } else {
                  flowRenders[li].labelX += nudge;
                  flowRenders[lj].labelX -= nudge;
                }
              } else {
                // Y nudge
                var nudgeY = (overlapY + 4) / 2;
                flowRenders[li].labelY -= nudgeY;
                flowRenders[lj].labelY += nudgeY;
              }
              moved = true;
            }
          }
          if (!moved) break;

          // Re-check against nodes after each pass
          flowRenders.forEach(function(lr) {
            var lr_rect = labelRect(lr);
            for (var ni = 0; ni < nodeBoxes.length; ni++) {
              if (rectsOverlap(lr_rect, nodeBoxes[ni])) {
                lr.labelY = Math.min(lr.labelY, nodeBoxes[ni].top - (lr.measured || measureText(lr.text)).height / 2 - 4);
              }
            }
          });
        }

        // --- Pass 3: create SVG elements with final positions ---
        flowRenders.forEach(function(lr) {
          var path = document.createElementNS(svgNS, 'path');
          path.setAttribute('class', 'arch-flow');
          path.setAttribute('d', lr.d);
          path.setAttribute('marker-end', 'url(#arrow)');
          path.style.pointerEvents = 'stroke';
          path.style.cursor = 'pointer';

          // Flow label — always visible (subtle), brighter on hover
          var textEl = document.createElementNS(svgNS, 'text');
          textEl.setAttribute('class', 'arch-flow-label');
          textEl.setAttribute('x', lr.labelX);
          textEl.setAttribute('y', lr.labelY);
          textEl.textContent = lr.text;

          path.addEventListener('mouseenter', function() {
            path.classList.add('active');
            path.setAttribute('marker-end', 'url(#arrow-active)');
            textEl.classList.add('active');
          });
          path.addEventListener('mouseleave', function() {
            path.classList.remove('active');
            path.setAttribute('marker-end', 'url(#arrow)');
            textEl.classList.remove('active');
          });

          svg.appendChild(path);
          svgLabels.appendChild(textEl);
        });

        canvas.appendChild(svg);
        canvas.appendChild(svgLabels);
      });
    }

    function renderLegend(project) {
      var legendEl = document.getElementById('legend');
      legendEl.innerHTML = '';

      var seen = {};
      project.tiers.forEach(function(tier) {
        tier.nodes.forEach(function(node) {
          if (!seen[node.primitive] && PRIMITIVE_COLORS[node.primitive]) {
            seen[node.primitive] = true;
            var item = document.createElement('div');
            item.className = 'legend-item';
            var dot = document.createElement('div');
            dot.className = 'legend-dot';
            dot.style.background = PRIMITIVE_COLORS[node.primitive].bg;
            item.appendChild(dot);
            var lbl = document.createElement('span');
            lbl.textContent = PRIMITIVE_COLORS[node.primitive].label;
            item.appendChild(lbl);
            legendEl.appendChild(item);
          }
        });
      });
    }

    // Initialize
    renderProjectSelector();
    renderProject();

    // ResizeObserver for iframe auto-height
    new ResizeObserver(function() {
      window.parent.postMessage(
        { type: 'embed.oshineye.resize', height: document.body.scrollHeight },
        '*'
      );
    }).observe(document.body);
  </script>
</body>
