<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EmDash Architecture</title>
  <style>
    :root {
      --bg: #f9fafb;
      --fg: #111827;
      --surface: #ffffff;
      --surface-hover: #f3f4f6;
      --border: #e5e7eb;
      --text: #111827;
      --text-muted: #6b7280;
      --accent: #8b5cf6;
      --accent-light: #ede9fe;
      --accent-border: #c4b5fd;
      --tier-client: #dbeafe;
      --tier-client-border: #93c5fd;
      --tier-client-text: #1e40af;
      --tier-edge: #fef3c7;
      --tier-edge-border: #fcd34d;
      --tier-edge-text: #92400e;
      --tier-core: #ede9fe;
      --tier-core-border: #c4b5fd;
      --tier-core-text: #5b21b6;
      --tier-auth: #fce7f3;
      --tier-auth-border: #f9a8d4;
      --tier-auth-text: #9d174d;
      --tier-storage: #d1fae5;
      --tier-storage-border: #6ee7b7;
      --tier-storage-text: #065f46;
      --tier-ai: #ffedd5;
      --tier-ai-border: #fdba74;
      --tier-ai-text: #9a3412;
      --tier-external: #f1f5f9;
      --tier-external-border: #cbd5e1;
      --tier-external-text: #475569;
      --arrow: #9ca3af;
      --font: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    :root.dark {
      --bg: #111827;
      --fg: #f9fafb;
      --surface: #1f2937;
      --surface-hover: #374151;
      --border: #374151;
      --text: #f9fafb;
      --text-muted: #9ca3af;
      --accent: #a78bfa;
      --accent-light: #2e1065;
      --accent-border: #6d28d9;
      --tier-client: #1e3a5f;
      --tier-client-border: #2563eb;
      --tier-client-text: #93c5fd;
      --tier-edge: #422006;
      --tier-edge-border: #d97706;
      --tier-edge-text: #fcd34d;
      --tier-core: #2e1065;
      --tier-core-border: #7c3aed;
      --tier-core-text: #c4b5fd;
      --tier-auth: #500724;
      --tier-auth-border: #db2777;
      --tier-auth-text: #f9a8d4;
      --tier-storage: #064e3b;
      --tier-storage-border: #059669;
      --tier-storage-text: #6ee7b7;
      --tier-ai: #431407;
      --tier-ai-border: #ea580c;
      --tier-ai-text: #fdba74;
      --tier-external: #1e293b;
      --tier-external-border: #475569;
      --tier-external-text: #94a3b8;
      --arrow: #6b7280;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--fg);
    }

    .view-selector {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .view-btn {
      padding: 6px 16px;
      border: 1px solid var(--border);
      border-radius: 9999px;
      background: var(--surface);
      color: var(--text-muted);
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .view-btn:hover {
      background: var(--surface-hover);
      color: var(--text);
    }

    .view-btn.active {
      background: var(--accent-light);
      color: var(--accent);
      border-color: var(--accent-border);
    }

    .description {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 20px;
      line-height: 1.55;
    }

    .description a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .description a:hover {
      text-decoration: underline;
    }

    .diagram {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface);
      box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px -1px rgba(0,0,0,0.1);
    }

    .diagram-content {
      padding: 20px;
    }

    .tier {
      margin-bottom: 12px;
      position: relative;
    }

    .tier:last-child {
      margin-bottom: 0;
    }

    .tier-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      padding-left: 2px;
    }

    .tier-nodes {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .node {
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid;
      font-size: 0.8rem;
      flex: 1;
      min-width: 120px;
      max-width: 200px;
      transition: transform 0.1s ease;
    }

    .node:hover {
      transform: translateY(-1px);
    }

    .node-name {
      font-weight: 600;
      display: block;
      font-size: 0.82rem;
      margin-bottom: 2px;
    }

    .node-detail {
      font-size: 0.7rem;
      opacity: 0.75;
      display: block;
      line-height: 1.4;
    }

    .tier-client .tier-label { color: var(--tier-client-text); }
    .tier-client .node { background: var(--tier-client); border-color: var(--tier-client-border); color: var(--tier-client-text); }

    .tier-edge .tier-label { color: var(--tier-edge-text); }
    .tier-edge .node { background: var(--tier-edge); border-color: var(--tier-edge-border); color: var(--tier-edge-text); }

    .tier-core .tier-label { color: var(--tier-core-text); }
    .tier-core .node { background: var(--tier-core); border-color: var(--tier-core-border); color: var(--tier-core-text); }

    .tier-auth .tier-label { color: var(--tier-auth-text); }
    .tier-auth .node { background: var(--tier-auth); border-color: var(--tier-auth-border); color: var(--tier-auth-text); }

    .tier-storage .tier-label { color: var(--tier-storage-text); }
    .tier-storage .node { background: var(--tier-storage); border-color: var(--tier-storage-border); color: var(--tier-storage-text); }

    .tier-ai .tier-label { color: var(--tier-ai-text); }
    .tier-ai .node { background: var(--tier-ai); border-color: var(--tier-ai-border); color: var(--tier-ai-text); }

    .tier-external .tier-label { color: var(--tier-external-text); }
    .tier-external .node { background: var(--tier-external); border-color: var(--tier-external-border); color: var(--tier-external-text); }

    .flow-arrows {
      display: flex;
      justify-content: center;
      padding: 4px 0;
      color: var(--arrow);
      font-size: 0.7rem;
      gap: 24px;
      flex-wrap: wrap;
    }

    .flow-arrows svg {
      display: block;
      margin: 0 auto;
    }

    .flows-section {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .flows-title {
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.72rem;
      margin-bottom: 6px;
      color: var(--text-muted);
    }

    .flow-item {
      display: flex;
      gap: 6px;
      align-items: baseline;
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.7;
    }

    .flow-arrow {
      color: var(--accent);
      flex-shrink: 0;
    }

    .flow-label {
      opacity: 0.75;
    }

    .packages-section {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .packages-title {
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.72rem;
      margin-bottom: 8px;
      color: var(--text-muted);
    }

    .package-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 6px;
    }

    .package-item {
      font-size: 0.78rem;
      padding: 6px 10px;
      border-radius: 4px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .package-item .pkg-name {
      font-weight: 600;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.75rem;
    }

    .package-item .pkg-desc {
      font-size: 0.68rem;
      color: var(--text-muted);
      display: block;
      margin-top: 1px;
    }

    .connector {
      display: flex;
      justify-content: center;
      padding: 2px 0;
    }

    .connector svg {
      display: block;
    }

    @media (max-width: 640px) {
      body { padding: 14px; }
      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
      .view-selector {
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        max-width: 100%;
        scrollbar-width: none;
        padding-bottom: 4px;
      }
      .view-selector::-webkit-scrollbar { display: none; }
      .view-btn {
        padding: 10px 16px;
        font-size: 0.8rem;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .node {
        min-width: 100px;
        max-width: none;
        padding: 8px 10px;
      }
      .node-name { font-size: 0.78rem; }
      .node-detail { font-size: 0.65rem; }
      .diagram-content { padding: 14px; }
      .flows-section, .packages-section { padding: 12px 14px; }
      .description { font-size: 0.78rem; }
      .package-grid {
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      }
    }

    @media (max-width: 380px) {
      body { padding: 10px; }
      h1 { font-size: 1rem; }
      .view-btn {
        padding: 8px 12px;
        font-size: 0.75rem;
      }
      .tier-nodes { gap: 6px; }
      .node { min-width: 80px; padding: 6px 8px; }
    }
  </style>
</head>

        id: "monorepo",
        name: "Monorepo",
        description: "A pnpm monorepo with 10 packages. The core is platform-agnostic (works with D1, SQLite, or Postgres); the cloudflare package injects Cloudflare-specific adapters. Built with tsdown, tested with Vitest + Playwright, formatted with oxfmt.",
        tiers: [
          {
            tier: "core",
            label: "packages/core",
            nodes: [
              { name: "Astro Integration", detail: "Middleware + routes" },
              { name: "22 API Handlers", detail: "ApiResponse&lt;T&gt; pattern" },
              { name: "Plugin System", detail: "Hooks, sandbox, scheduler" },
              { name: "MCP Server", detail: "AI agent interface" }
            ]
          },
          {
            tier: "client",
            label: "packages/admin + packages/blocks",
            nodes: [
              { name: "Admin Dashboard", detail: "CMS management UI" },
              { name: "Portable Text Blocks", detail: "TipTap block defs" },
              { name: "Block Playground", detail: "Block previews" }
            ]
          },
          {
            tier: "auth",
            label: "packages/auth",
            nodes: [
              { name: "Strategies", detail: "Passkey, OAuth, Magic Link" },
              { name: "RBAC", detail: "Roles & permissions" },
              { name: "Tokens", detail: "JWT management" },
              { name: "Adapters", detail: "Provider abstraction" }
            ]
          },
          {
            tier: "edge",
            label: "packages/cloudflare",
            nodes: [
              { name: "D1 Adapter", detail: "Kysely dialect" },
              { name: "R2 Adapter", detail: "S3-compatible" },
              { name: "KV Adapter", detail: "Session store" },
              { name: "Worker Loaders", detail: "Plugin sandbox" }
            ]
          },
          {
            tier: "ai",
            label: "packages/marketplace",
            nodes: [
              { name: "Discovery", detail: "Plugin search & browse" },
              { name: "Publishing", detail: "Submit & version" },
              { name: "Security Audit", detail: "AI-powered review" },
              { name: "Moderation", detail: "Approval workflow" }
            ]
          },
          {
            tier: "storage",
            label: "packages/plugins (first-party)",
            nodes: [
              { name: "ai-moderation", detail: "Content moderation" },
              { name: "atproto", detail: "Bluesky / AT Protocol" },
              { name: "audit-log", detail: "Activity tracking" },
              { name: "forms + webhooks", detail: "Data collection" }
            ]
          },
          {
            tier: "external",
            label: "Tooling & Templates",
            nodes: [
              { name: "create-emdash", detail: "npm create CLI" },
              { name: "gutenberg-to-pt", detail: "WP block converter" },
              { name: "9 templates", detail: "Blog, marketing, portfolio" },
              { name: "skills/", detail: "AI agent skills" }
            ]
          }
        ],
        flows: [
          { from: "core", to: "auth", label: "Authentication delegation" },
          { from: "core", to: "Storage Interface", label: "Platform-agnostic calls" },
          { from: "cloudflare", to: "Storage Interface", label: "Injects D1/R2/KV" },
          { from: "marketplace", to: "Workers AI", label: "Security scanning" },
          { from: "gutenberg-to-pt", to: "core", label: "WordPress migration" },
          { from: "create-emdash", to: "templates", label: "Scaffold new site" }
        ],
        packages: null
      }
    ];

    // Theme
    var params = new URL(location.href).searchParams;
    var theme = params.get('theme') || 'light';
    if (theme === 'dark') document.documentElement.classList.add('dark');

    var activeView = params.get('view') || 'overview';
    if (!VIEWS.some(function(v) { return v.id === activeView; })) activeView = 'overview';

    function renderViewSelector() {
      var sel = document.getElementById('viewSelector');
      sel.innerHTML = '';
      VIEWS.forEach(function(v) {
        var btn = document.createElement('button');
        btn.className = 'view-btn' + (v.id === activeView ? ' active' : '');
        btn.textContent = v.name;
        btn.onclick = function() { switchView(v.id); };
        sel.appendChild(btn);
      });
    }

    function switchView(id) {
      activeView = id;
      var url = new URL(location.href);
      url.searchParams.set('view', id);
      history.replaceState(null, '', url);
      renderViewSelector();
      renderDiagram();
    }

    function renderConnector() {
      var div = document.createElement('div');
      div.className = 'connector';
      var arrowColor = getComputedStyle(document.documentElement).getPropertyValue('--arrow').trim() || '#9ca3af';
      div.innerHTML = '<svg width="2" height="12" viewBox="0 0 2 12"><line x1="1" y1="0" x2="1" y2="12" stroke="' + arrowColor + '" stroke-width="1.5" stroke-dasharray="3,2"/></svg>';
      return div;
    }

    function renderDiagram() {
      var view = VIEWS.find(function(v) { return v.id === activeView; });
      if (!view) return;

      // Description
      document.getElementById('viewDescription').innerHTML = view.description;

      // Tiers
      var content = document.getElementById('diagramContent');
      content.innerHTML = '';

      view.tiers.forEach(function(t, i) {
        if (i > 0) {
          content.appendChild(renderConnector());
        }

        var tierDiv = document.createElement('div');
        tierDiv.className = 'tier tier-' + t.tier;

        var label = document.createElement('div');
        label.className = 'tier-label';
        label.textContent = t.label;
        tierDiv.appendChild(label);

        var nodesDiv = document.createElement('div');
        nodesDiv.className = 'tier-nodes';

        t.nodes.forEach(function(n) {
          var nodeDiv = document.createElement('div');
          nodeDiv.className = 'node';
          var nameSpan = document.createElement('span');
          nameSpan.className = 'node-name';
          nameSpan.textContent = n.name;
          var detailSpan = document.createElement('span');
          detailSpan.className = 'node-detail';
          detailSpan.textContent = n.detail;
          nodeDiv.appendChild(nameSpan);
          nodeDiv.appendChild(detailSpan);
          nodesDiv.appendChild(nodeDiv);
        });

        tierDiv.appendChild(nodesDiv);
        content.appendChild(tierDiv);
      });

      // Flows
      var flowsSection = document.getElementById('flowsSection');
      flowsSection.innerHTML = '';
      if (view.flows && view.flows.length > 0) {
        flowsSection.style.display = '';
        var title = document.createElement('div');
        title.className = 'flows-title';
        title.textContent = 'Data Flows';
        flowsSection.appendChild(title);

        view.flows.forEach(function(f) {
          var item = document.createElement('div');
          item.className = 'flow-item';
          item.innerHTML = '<span>' + f.from + '</span>' +
            '<span class="flow-arrow">\u2192</span>' +
            '<span>' + f.to + '</span>' +
            '<span class="flow-label">' + f.label + '</span>';
          flowsSection.appendChild(item);
        });
      } else {
        flowsSection.style.display = 'none';
      }

      // Packages
      var pkgSection = document.getElementById('packagesSection');
      if (view.packages && view.packages.length > 0) {
        pkgSection.style.display = '';
        pkgSection.innerHTML = '';
        var pkgTitle = document.createElement('div');
        pkgTitle.className = 'packages-title';
        pkgTitle.textContent = 'Monorepo Packages';
        pkgSection.appendChild(pkgTitle);

        var grid = document.createElement('div');
        grid.className = 'package-grid';
        view.packages.forEach(function(p) {
          var item = document.createElement('div');
          item.className = 'package-item';
          item.innerHTML = '<span class="pkg-name">' + p.name + '</span><span class="pkg-desc">' + p.desc + '</span>';
          grid.appendChild(item);
        });
        pkgSection.appendChild(grid);
      } else {
        pkgSection.style.display = 'none';
      }
    }

    // Initialize
    renderViewSelector();
    renderDiagram();

    // ResizeObserver for iframe auto-height
    new ResizeObserver(function() {
      window.parent.postMessage(
        { type: 'embed.oshineye.resize', height: document.body.scrollHeight },
        '*'
      );
    }).observe(document.body);
  </script>
</body>
</html>
