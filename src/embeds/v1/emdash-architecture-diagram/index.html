<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EmDash Architecture</title>
  <style>
    :root {
      --bg: #f9fafb;
      --fg: #111827;
      --surface: #ffffff;
      --surface-hover: #f3f4f6;
      --border: #e5e7eb;
      --text: #111827;
      --text-muted: #6b7280;
      --accent: #8b5cf6;
      --accent-light: #ede9fe;
      --accent-border: #c4b5fd;
      --font: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    :root.dark {
      --bg: #111827;
      --fg: #f9fafb;
      --surface: #1f2937;
      --surface-hover: #374151;
      --border: #374151;
      --text: #f9fafb;
      --text-muted: #9ca3af;
      --accent: #a78bfa;
      --accent-light: #2e1065;
      --accent-border: #6d28d9;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }
    h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--fg);
    }
    .view-selector {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .view-btn {
      padding: 6px 16px;
      border: 1px solid var(--border);
      border-radius: 9999px;
      background: var(--surface);
      color: var(--text-muted);
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .view-btn:hover { background: var(--surface-hover); color: var(--text); }
    .view-btn.active {
      background: var(--accent-light);
      color: var(--accent);
      border-color: var(--accent-border);
    }
    .description {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 16px;
      line-height: 1.55;
    }
    .description a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .description a:hover { text-decoration: underline; }
    .diagram-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface);
      box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px -1px rgba(0,0,0,0.1);
    }
    .diagram-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .diagram-header-title {
      font-weight: 600;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }
    .mermaid-container {
      padding: 14px;
      overflow-x: auto;
      display: flex;
      justify-content: center;
      background: var(--surface);
    }
    .mermaid-container svg {
      max-width: 100%;
      height: auto;
    }
    .emdash-view-svg { display: none; }
    .emdash-view-svg.active { display: block; }
    .mermaid-flows {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      font-size: 0.875rem;
      line-height: 1.7;
      color: var(--text-muted);
      background: var(--surface);
    }
    .mermaid-flows-title {
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.72rem;
      margin-bottom: 4px;
      color: var(--text-muted);
    }
    .mermaid-flow-item {
      display: flex;
      gap: 6px;
      align-items: baseline;
    }
    .mermaid-flow-arrow { color: var(--accent); flex-shrink: 0; }
    .mermaid-flow-label { color: var(--text-muted); opacity: 0.75; }

    @media (max-width: 640px) {
      body { padding: 14px; }
      .header { flex-direction: column; align-items: flex-start; gap: 10px; }
      .view-selector {
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        max-width: 100%;
        scrollbar-width: none;
        padding-bottom: 4px;
      }
      .view-selector::-webkit-scrollbar { display: none; }
      .view-btn {
        padding: 10px 16px;
        font-size: 0.8rem;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .mermaid-container { padding: 8px; }
      .mermaid-flows { padding: 10px 12px; font-size: 0.8rem; }
    }
    @media (max-width: 380px) {
      body { padding: 10px; }
      h1 { font-size: 1rem; }
      .view-btn { padding: 8px 12px; font-size: 0.75rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>EmDash Architecture</h1>
    <div class="view-selector" id="viewSelector"></div>
  </div>
  <div class="description" id="viewDescription"></div>

  <div class="diagram-card">
    <div class="diagram-header">
      <span class="diagram-code-title diagram-header-title" id="diagramTitle">Mermaid</span>
    </div>
    <div class="mermaid-container">
      <!-- EMDASH_DIAGRAMS -->
    </div>
    <div class="mermaid-flows" id="mermaidFlows"></div>
  </div>

  <script>
    var VIEWS = [
      {
        id: 'overview',
        name: 'Overview',
        description: 'EmDash is an agent-portable reimagination of WordPress built on Astro and Cloudflare Workers. Content is Portable Text (structured JSON) edited with TipTap and stored in D1 via Kysely. Plugins run in sandboxed Dynamic Worker Loader isolates. <a href="https://github.com/emdash-cms/emdash" target="_blank" rel="noopener">github.com/emdash-cms/emdash</a>',
        flows: [
          { from: 'Admin / API / CLI', to: 'Astro', label: 'HTTP requests' },
          { from: 'AI Agents', to: 'MCP Server', label: 'MCP protocol' },
          { from: 'Astro', to: 'Content API', label: 'middleware chain' },
          { from: 'Content API', to: 'D1', label: 'Kysely SQL' },
          { from: 'Content API', to: 'Schema Engine', label: 'validates type' },
          { from: 'Plugin Manager', to: 'Workers AI', label: 'security audit' }
        ]
      },
      {
        id: 'packages',
        name: 'Packages',
        description: 'A pnpm monorepo with 10 packages. The core is platform-agnostic (works with D1, SQLite, or Postgres). The cloudflare package injects Cloudflare-specific adapters at runtime. The marketplace runs as a standalone Worker with AI-powered security auditing.',
        flows: [
          { from: 'packages/core', to: 'packages/auth', label: 'delegates auth' },
          { from: 'packages/core', to: 'packages/cloudflare', label: 'storage interface' },
          { from: 'packages/plugins', to: 'packages/core', label: 'hooks + routes' },
          { from: 'packages/marketplace', to: 'packages/core', label: 'install + discover' },
          { from: 'gutenberg-to-pt', to: 'packages/core', label: 'WordPress migration' }
        ]
      },
      {
        id: 'pipeline',
        name: 'Request Pipeline',
        description: 'Every request passes through a four-step middleware chain before reaching the API handler. All handlers return ApiResponse\u003cT\u003e discriminated unions. Storage is accessed through platform-agnostic adapters (D1/SQLite/Postgres, R2/S3/local, KV/Redis).',
        flows: [
          { from: 'setup.ts', to: 'auth.ts', label: 'run migrations first' },
          { from: 'auth.ts', to: 'request-context.ts', label: 'validated session' },
          { from: 'Astro Route', to: 'Handler', label: 'parse + forward' },
          { from: 'Content Service', to: 'Schema Registry', label: 'validate type' },
          { from: 'Content Service', to: 'Revision Service', label: 'auto-version' },
          { from: 'All handlers', to: 'Storage Adapters', label: 'platform-agnostic' }
        ]
      },
      {
        id: 'auth',
        name: 'Auth',
        description: 'WebAuthn Passkeys are the primary authentication method \u2014 no passwords. OAuth and Magic Link serve as fallbacks. All strategies converge at a JWT Token Service before RBAC attaches permissions.',
        flows: [
          { from: 'Passkey', to: 'WebAuthn RP Adapter', label: 'challenge + response' },
          { from: 'OAuth Flow', to: 'Provider Callback', label: 'authorization code' },
          { from: 'Magic Link', to: 'Email Adapter', label: 'send + verify token' },
          { from: 'All strategies', to: 'Token Service', label: 'issue JWT' },
          { from: 'Token Service', to: 'RBAC', label: 'attach permissions' }
        ]
      },
      {
        id: 'plugins',
        name: 'Plugins',
        description: '96% of WordPress vulnerabilities come from plugins. EmDash runs every plugin in a sandboxed Dynamic Worker Loader isolate with a capability manifest. The marketplace uses Workers AI to audit code before publishing.',
        flows: [
          { from: 'Marketplace', to: 'Code Auditor', label: 'pre-publish scan' },
          { from: 'Workers AI', to: 'Code Auditor', label: 'threat detection model' },
          { from: 'Plugin Manager', to: 'Hook System', label: 'lifecycle events' },
          { from: 'Hook System', to: 'Worker Isolate', label: 'sandboxed execution' },
          { from: 'Scheduler', to: 'Plugin Manager', label: 'cron trigger' }
        ]
      }
    ];

    var params = new URL(location.href).searchParams;
    var theme = params.get('theme') || 'light';
    if (theme === 'dark') document.documentElement.classList.add('dark');

    var activeView = params.get('view') || 'overview';
    if (!VIEWS.some(function(v) { return v.id === activeView; })) activeView = 'overview';

    function renderSelector() {
      var sel = document.getElementById('viewSelector');
      sel.innerHTML = '';
      VIEWS.forEach(function(v) {
        var btn = document.createElement('button');
        btn.className = 'view-btn' + (v.id === activeView ? ' active' : '');
        btn.textContent = v.name;
        btn.onclick = function() { switchView(v.id); };
        sel.appendChild(btn);
      });
    }

    function switchView(id) {
      activeView = id;
      var url = new URL(location.href);
      url.searchParams.set('view', id);
      history.replaceState(null, '', url);
      renderSelector();
      renderView();
    }

    function renderView() {
      var view = VIEWS.find(function(v) { return v.id === activeView; });
      if (!view) return;

      document.getElementById('viewDescription').innerHTML = view.description;

      // Show active SVG, hide others
      var svgs = document.querySelectorAll('.emdash-view-svg');
      svgs.forEach(function(el) {
        if (el.getAttribute('data-view-id') === activeView) {
          el.classList.add('active');
        } else {
          el.classList.remove('active');
        }
      });

      // Render flows
      var flowsEl = document.getElementById('mermaidFlows');
      flowsEl.innerHTML = '<div class="mermaid-flows-title">Flows</div>';
      view.flows.forEach(function(flow) {
        var item = document.createElement('div');
        item.className = 'mermaid-flow-item';
        item.innerHTML = '<span>' + flow.from + '</span>' +
          '<span class="mermaid-flow-arrow">\u2192</span>' +
          '<span>' + flow.to + '</span>' +
          '<span class="mermaid-flow-label">' + flow.label + '</span>';
        flowsEl.appendChild(item);
      });

      window.parent.postMessage(
        { type: 'embed.oshineye.resize', height: document.body.scrollHeight }, '*'
      );
    }

    renderSelector();
    renderView();

    new ResizeObserver(function() {
      window.parent.postMessage(
        { type: 'embed.oshineye.resize', height: document.body.scrollHeight }, '*'
      );
    }).observe(document.body);
  </script>
</body>
</html>
