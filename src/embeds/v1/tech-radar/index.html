<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Radar</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a2e;
      --ring-stroke: #ccc;
      --adopt: #2ecc71;
      --trial: #3498db;
      --assess: #f39c12;
      --hold: #e74c3c;
      --label: #555;
    }

    :root.dark {
      --bg: #1a1a2e;
      --text: #e0e0e0;
      --ring-stroke: #444;
      --adopt: #27ae60;
      --trial: #2980b9;
      --assess: #e67e22;
      --hold: #c0392b;
      --label: #aaa;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 1.25rem;
      margin-bottom: 16px;
    }

    .radar-container {
      position: relative;
      width: 100%;
      max-width: 500px;
    }

    svg {
      width: 100%;
      height: auto;
    }

    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 16px;
      font-size: 0.85rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
  </style>
</head>
<body>
  <h1>Tech Radar</h1>
  <div class="radar-container">
    <svg id="radar" viewBox="0 0 500 500"></svg>
  </div>
  <div class="legend" id="legend"></div>

  <script>
    (function () {
      var theme = new URL(location.href).searchParams.get('theme') || 'light';
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      }

      var rings = [
        { name: 'Adopt', radius: 80, color: 'var(--adopt)' },
        { name: 'Trial', radius: 150, color: 'var(--trial)' },
        { name: 'Assess', radius: 210, color: 'var(--assess)' },
        { name: 'Hold', radius: 245, color: 'var(--hold)' }
      ];

      var blips = [
        { name: 'TypeScript', ring: 0, quadrant: 0 },
        { name: 'Hono', ring: 0, quadrant: 1 },
        { name: 'Cloudflare Workers', ring: 0, quadrant: 2 },
        { name: 'Deno', ring: 1, quadrant: 0 },
        { name: 'HTMX', ring: 1, quadrant: 1 },
        { name: 'Bun', ring: 1, quadrant: 3 },
        { name: 'Effect-TS', ring: 2, quadrant: 0 },
        { name: 'Solid.js', ring: 2, quadrant: 2 },
        { name: 'tRPC', ring: 2, quadrant: 3 },
        { name: 'Webpack', ring: 3, quadrant: 1 },
        { name: 'Moment.js', ring: 3, quadrant: 3 }
      ];

      var svg = document.getElementById('radar');
      var cx = 250, cy = 250;
      var style = getComputedStyle(document.documentElement);

      // Draw rings
      for (var i = rings.length - 1; i >= 0; i--) {
        var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', cx);
        circle.setAttribute('cy', cy);
        circle.setAttribute('r', rings[i].radius);
        circle.setAttribute('fill', 'none');
        circle.setAttribute('stroke', 'var(--ring-stroke)');
        circle.setAttribute('stroke-width', '1');
        svg.appendChild(circle);

        // Ring label
        var text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', cx);
        text.setAttribute('y', cy - rings[i].radius + 14);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('fill', 'var(--label)');
        text.setAttribute('font-size', '11');
        text.textContent = rings[i].name;
        svg.appendChild(text);
      }

      // Draw quadrant lines
      var line1 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line1.setAttribute('x1', cx - 245); line1.setAttribute('y1', cy);
      line1.setAttribute('x2', cx + 245); line1.setAttribute('y2', cy);
      line1.setAttribute('stroke', 'var(--ring-stroke)'); line1.setAttribute('stroke-width', '1');
      svg.appendChild(line1);

      var line2 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line2.setAttribute('x1', cx); line2.setAttribute('y1', cy - 245);
      line2.setAttribute('x2', cx); line2.setAttribute('y2', cy + 245);
      line2.setAttribute('stroke', 'var(--ring-stroke)'); line2.setAttribute('stroke-width', '1');
      svg.appendChild(line2);

      // Place blips
      function seededRandom(seed) {
        var x = Math.sin(seed) * 10000;
        return x - Math.floor(x);
      }

      blips.forEach(function (blip, idx) {
        var ring = rings[blip.ring];
        var prevRadius = blip.ring > 0 ? rings[blip.ring - 1].radius : 0;
        var midRadius = (prevRadius + ring.radius) / 2;

        // Quadrant angle ranges: 0=top-right, 1=bottom-right, 2=bottom-left, 3=top-left
        var angleStart = blip.quadrant * (Math.PI / 2) - Math.PI / 2;
        var angle = angleStart + seededRandom(idx * 7 + 3) * (Math.PI / 2);
        var r = midRadius + (seededRandom(idx * 13 + 5) - 0.5) * (ring.radius - prevRadius) * 0.6;

        var x = cx + r * Math.cos(angle);
        var y = cy + r * Math.sin(angle);

        var dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        dot.setAttribute('cx', x);
        dot.setAttribute('cy', y);
        dot.setAttribute('r', '6');
        dot.setAttribute('fill', ring.color);

        var title = document.createElementNS('http://www.w3.org/2000/svg', 'title');
        title.textContent = blip.name;
        dot.appendChild(title);
        svg.appendChild(dot);

        var label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        label.setAttribute('x', x + 9);
        label.setAttribute('y', y + 4);
        label.setAttribute('fill', 'var(--text)');
        label.setAttribute('font-size', '10');
        label.textContent = blip.name;
        svg.appendChild(label);
      });

      // Legend
      var legendEl = document.getElementById('legend');
      rings.forEach(function (ring) {
        var item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = '<span class="legend-dot" style="background:' + ring.color + '"></span>' + ring.name;
        legendEl.appendChild(item);
      });

      // Resize observer for postMessage-based auto-height
      new ResizeObserver(function () {
        window.parent.postMessage(
          { type: 'embed.oshineye.resize', height: document.body.scrollHeight },
          '*'
        );
      }).observe(document.body);
    })();
  </script>
</body>
</html>
