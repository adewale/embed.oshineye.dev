<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading Timeline</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a2e;
      --accent: #0f3460;
      --line: #e0e0e0;
      --dot: #e94560;
      --card-bg: #f8f9fa;
      --card-border: #dee2e6;
    }

    :root.dark {
      --bg: #1a1a2e;
      --text: #e0e0e0;
      --accent: #e94560;
      --line: #333;
      --dot: #0f3460;
      --card-bg: #16213e;
      --card-border: #0f3460;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
      line-height: 1.6;
    }

    h1 {
      font-size: 1.25rem;
      margin-bottom: 24px;
      color: var(--accent);
    }

    .timeline {
      position: relative;
      padding-left: 32px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 8px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--line);
    }

    .timeline-item {
      position: relative;
      margin-bottom: 24px;
      padding: 16px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
    }

    .timeline-item::before {
      content: '';
      position: absolute;
      left: -28px;
      top: 20px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--dot);
      border: 2px solid var(--bg);
    }

    .timeline-date {
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .timeline-title {
      font-size: 1rem;
      font-weight: 600;
      margin: 4px 0;
    }

    .timeline-author {
      font-size: 0.85rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <h1>Reading Timeline</h1>
  <div class="timeline" id="timeline"></div>

  <script>
    (function () {
      const theme = new URL(location.href).searchParams.get('theme') || 'light';
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      }

      const books = [
        { date: 'Jan 2025', title: 'Designing Data-Intensive Applications', author: 'Martin Kleppmann' },
        { date: 'Feb 2025', title: 'The Pragmatic Programmer', author: 'David Thomas & Andrew Hunt' },
        { date: 'Mar 2025', title: 'Building Microservices', author: 'Sam Newman' },
        { date: 'Apr 2025', title: 'Staff Engineer', author: 'Will Larson' },
        { date: 'May 2025', title: 'A Philosophy of Software Design', author: 'John Ousterhout' },
      ];

      const container = document.getElementById('timeline');
      books.forEach(function (book) {
        const item = document.createElement('div');
        item.className = 'timeline-item';
        item.innerHTML =
          '<div class="timeline-date">' + book.date + '</div>' +
          '<div class="timeline-title">' + book.title + '</div>' +
          '<div class="timeline-author">' + book.author + '</div>';
        container.appendChild(item);
      });

      // Resize observer for postMessage-based auto-height
      new ResizeObserver(function () {
        window.parent.postMessage(
          { type: 'embeds.oshineye.resize', height: document.body.scrollHeight },
          '*'
        );
      }).observe(document.body);
    })();
  </script>
</body>
</html>
